<svg xmlns="http://www.w3.org/2000/svg" width="600" height="360" viewBox="0 0 600 360">
  <rect width="600" height="360" fill="#0d0d10"/>
  <!-- Placa Arduino -->
  <rect x="160" y="80" width="280" height="180" rx="10" fill="#1a2a1a" stroke="#2a8a2a" stroke-width="2"/>
  <!-- Chip central -->
  <rect x="245" y="130" width="110" height="80" rx="4" fill="#0a0a0a" stroke="#3a3a3a" stroke-width="1"/>
  <text x="265" y="175" font-family="monospace" font-size="10" fill="#2a8a2a">ARDUINO</text>
  <text x="268" y="190" font-family="monospace" font-size="9" fill="#2a8a2a">UNO R3</text>
  <!-- Pinos -->
  <rect x="165" y="90" width="8" height="160" rx="2" fill="#1a1a1a"/>
  <circle cx="169" cy="110" r="3" fill="#c8a800"/>
  <circle cx="169" cy="130" r="3" fill="#c8a800"/>
  <circle cx="169" cy="150" r="3" fill="#c8a800"/>
  <circle cx="169" cy="170" r="3" fill="#c8a800"/>
  <circle cx="169" cy="190" r="3" fill="#c8a800"/>
  <circle cx="169" cy="210" r="3" fill="#c8a800"/>
  <!-- Sensor de fumaça MQ-2 -->
  <rect x="70" y="110" width="60" height="60" rx="6" fill="#1a1a2a" stroke="#ff4500" stroke-width="1.5"/>
  <circle cx="100" cy="140" r="18" fill="#0a0a0a" stroke="#ff4500" stroke-width="1"/>
  <text x="80" y="185" font-family="monospace" font-size="9" fill="#ff4500">MQ-2</text>
  <text x="72" y="196" font-family="monospace" font-size="8" fill="#7a8694">FUMAÇA</text>
  <!-- Fios sensor fumaça -->
  <line x1="130" y1="135" x2="160" y2="150" stroke="#ff4500" stroke-width="1.5"/>
  <line x1="130" y1="145" x2="160" y2="170" stroke="#2a2a8a" stroke-width="1.5"/>
  <!-- Sensor de temperatura LM35 -->
  <rect x="470" y="110" width="60" height="60" rx="6" fill="#1a1a2a" stroke="#2a8aff" stroke-width="1.5"/>
  <circle cx="500" cy="140" r="18" fill="#0a0a0a" stroke="#2a8aff" stroke-width="1"/>
  <text x="478" y="185" font-family="monospace" font-size="9" fill="#2a8aff">LM35</text>
  <text x="470" y="196" font-family="monospace" font-size="8" fill="#7a8694">TEMP.</text>
  <!-- Fios sensor temperatura -->
  <line x1="470" y1="135" x2="440" y2="150" stroke="#2a8aff" stroke-width="1.5"/>
  <line x1="470" y1="145" x2="440" y2="170" stroke="#c8a800" stroke-width="1.5"/>
  <!-- LED alerta -->
  <circle cx="300" cy="280" r="12" fill="#ff4500" opacity="0.8"/>
  <line x1="295" y1="260" x2="293" y2="245" stroke="#c8a800" stroke-width="1.5"/>
  <line x1="305" y1="260" x2="307" y2="245" stroke="#2a2a8a" stroke-width="1.5"/>
  <text x="268" y="308" font-family="monospace" font-size="9" fill="#ff4500">LED ALERTA</text>
  <!-- Display LCD -->
  <rect x="350" y="260" width="120" height="50" rx="4" fill="#0a2a0a" stroke="#2a8a2a" stroke-width="1"/>
  <text x="358" y="280" font-family="monospace" font-size="8" fill="#2aff2a">TEMP: 38.5C</text>
  <text x="358" y="295" font-family="monospace" font-size="8" fill="#ff4500">ALERTA!</text>
  <text x="358" y="308" font-family="monospace" font-size="8" fill="#2aff2a">FUMACA: HIGH</text>
</svg>
