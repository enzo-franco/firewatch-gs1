<svg xmlns="http://www.w3.org/2000/svg" width="800" height="400" viewBox="0 0 800 400">
  <rect width="800" height="400" fill="#0a0e14"/>
  <!-- estrelas -->
  <circle cx="50" cy="30" r="1.5" fill="white" opacity="0.7"/>
  <circle cx="120" cy="80" r="1" fill="white" opacity="0.5"/>
  <circle cx="200" cy="20" r="2" fill="white" opacity="0.6"/>
  <circle cx="350" cy="60" r="1.5" fill="white" opacity="0.4"/>
  <circle cx="500" cy="40" r="1" fill="white" opacity="0.7"/>
  <circle cx="650" cy="90" r="2" fill="white" opacity="0.5"/>
  <circle cx="750" cy="25" r="1.5" fill="white" opacity="0.6"/>
  <circle cx="680" cy="150" r="1" fill="white" opacity="0.4"/>
  <circle cx="100" cy="200" r="1.5" fill="white" opacity="0.5"/>
  <circle cx="740" cy="300" r="1" fill="white" opacity="0.6"/>
  <circle cx="30" cy="350" r="2" fill="white" opacity="0.4"/>
  <circle cx="420" cy="380" r="1.5" fill="white" opacity="0.5"/>
  <!-- Terra curva -->
  <ellipse cx="400" cy="520" rx="500" ry="200" fill="#1a3a5c" opacity="0.6"/>
  <ellipse cx="400" cy="520" rx="500" ry="200" fill="none" stroke="#2a6aaa" stroke-width="1" opacity="0.4"/>
  <!-- Satélite corpo -->
  <rect x="340" y="160" width="120" height="60" rx="8" fill="#2a2a3a" stroke="#ff4500" stroke-width="1.5"/>
  <!-- Painéis solares esquerda -->
  <rect x="200" y="175" width="130" height="30" rx="4" fill="#1a3a6a" stroke="#2a5aaa" stroke-width="1"/>
  <line x1="230" y1="175" x2="230" y2="205" stroke="#2a5aaa" stroke-width="0.5"/>
  <line x1="260" y1="175" x2="260" y2="205" stroke="#2a5aaa" stroke-width="0.5"/>
  <line x1="290" y1="175" x2="290" y2="205" stroke="#2a5aaa" stroke-width="0.5"/>
  <!-- Painéis solares direita -->
  <rect x="470" y="175" width="130" height="30" rx="4" fill="#1a3a6a" stroke="#2a5aaa" stroke-width="1"/>
  <line x1="500" y1="175" x2="500" y2="205" stroke="#2a5aaa" stroke-width="0.5"/>
  <line x1="530" y1="175" x2="530" y2="205" stroke="#2a5aaa" stroke-width="0.5"/>
  <line x1="560" y1="175" x2="560" y2="205" stroke="#2a5aaa" stroke-width="0.5"/>
  <!-- Antena -->
  <line x1="400" y1="160" x2="400" y2="120" stroke="#ff4500" stroke-width="2"/>
  <circle cx="400" cy="115" r="6" fill="none" stroke="#ff4500" stroke-width="1.5"/>
  <!-- Feixe de sinal -->
  <line x1="400" y1="220" x2="370" y2="320" stroke="#ff4500" stroke-width="1" stroke-dasharray="4,4" opacity="0.6"/>
  <line x1="400" y1="220" x2="430" y2="320" stroke="#ff4500" stroke-width="1" stroke-dasharray="4,4" opacity="0.6"/>
  <!-- Ponto de foco/calor na Terra -->
  <circle cx="400" cy="330" r="8" fill="#ff4500" opacity="0.8"/>
  <circle cx="400" cy="330" r="14" fill="none" stroke="#ff4500" stroke-width="1" opacity="0.4"/>
  <circle cx="400" cy="330" r="20" fill="none" stroke="#ff8c00" stroke-width="1" opacity="0.2"/>
  <!-- Texto indicador -->
  <text x="425" y="335" font-family="monospace" font-size="11" fill="#ff4500" opacity="0.9">FOCO DETECTADO</text>
</svg>
